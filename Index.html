<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meu Dinheiro Pro - Controle Financeiro Completo</title>
    <link rel="manifest" href="#" id="manifest-placeholder">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/dist/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #e0f2fe;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --success: #10b981;
            --success-light: #d1fae5;
            --info: #8b5cf6;
            --info-light: #ede9fe;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            width: 100%;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 1.75rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--info));
        }

        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: var(--primary-light);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 900;
            font-family: 'Epilogue', sans-serif;
            margin: 0.5rem 0;
            line-height: 1;
        }

        .stat-value.positive {
            color: var(--success);
        }

        .stat-value.negative {
            color: var(--danger);
        }

        .stat-trend {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Cards */
        .card {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Epilogue', sans-serif;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--bg-primary);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 1.25rem;
            line-height: 1;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Transactions List */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .transaction-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
            transform: translateX(4px);
        }

        .transaction-item.future {
            background: var(--warning-light);
            border-color: var(--warning);
        }

        .transaction-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .transaction-category {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .transaction-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .transaction-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .transaction-amount {
            font-weight: 800;
            font-size: 1.25rem;
            font-family: 'Epilogue', sans-serif;
        }

        .transaction-amount.income {
            color: var(--success);
        }

        .transaction-amount.expense {
            color: var(--danger);
        }

        .transaction-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: transparent;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 1.25rem;
        }

        .btn-icon:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.2s;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--bg-primary);
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Epilogue', sans-serif;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* Login/Register */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--info-light) 100%);
            padding: 1rem;
        }

        .auth-card {
            background: var(--bg-primary);
            border-radius: 32px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-lg);
        }

        .auth-logo {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--info) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            font-family: inherit;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
        }

        /* Cashflow Chart */
        .cashflow-chart {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        /* Bank Accounts */
        .bank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .bank-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--info) 100%);
            color: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .bank-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .bank-name {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .bank-balance {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Epilogue', sans-serif;
            margin-bottom: 0.5rem;
        }

        .bank-type {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .alert-success {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .alert-danger {
            background: var(--danger-light);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .alert-info {
            background: var(--info-light);
            color: var(--info);
            border: 1px solid var(--info);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 1.5rem 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 1rem;
                max-height: 85vh;
            }

            .auth-card {
                padding: 2rem 1.5rem;
            }

            .stat-value {
                font-size: 1.875rem;
            }

            .transaction-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .transaction-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // Categorias baseadas no Excel
        const INCOME_CATEGORIES = [
            { code: '50', name: 'Saldo Anterior' },
            { code: '51', name: 'Salários' },
            { code: '52', name: '13º Salário' },
            { code: '53', name: 'Férias' },
            { code: '54', name: 'PLR' },
            { code: '55', name: 'Juros s/ Poupança' },
            { code: '56', name: 'Juros s/ Aplicações' },
            { code: '57', name: 'Caixa' },
            { code: '58', name: 'Empréstimos' },
            { code: '59', name: 'Aluguéis' },
            { code: '60', name: 'Rendimentos' },
            { code: '64', name: 'VR Alimentação' },
            { code: '87', name: 'Conta Investimento BTG' },
            { code: '99', name: 'Outras Rendas' }
        ];

        const EXPENSE_CATEGORIES = [
            { code: '100', name: 'Habitação' },
            { code: '200', name: 'Alimentação' },
            { code: '300', name: 'Transporte' },
            { code: '400', name: 'Saúde' },
            { code: '500', name: 'Educação' },
            { code: '600', name: 'Lazer' },
            { code: '700', name: 'Vestuário' },
            { code: '800', name: 'Serviços' },
            { code: '900', name: 'Investimentos' },
            { code: '1000', name: 'Cartão de Crédito' },
            { code: '1100', name: 'Outros' }
        ];

        const BANKS = [
            'Banco do Brasil',
            'Itaú',
            'Bradesco',
            'Santander',
            'Caixa Econômica',
            'Nubank',
            'Inter',
            'BTG Pactual',
            'C6 Bank',
            'PicPay',
            'Outro'
        ];

        const PAYMENT_METHODS = [
            'Dinheiro',
            'Débito',
            'Crédito',
            'PIX',
            'Transferência',
            'Boleto'
        ];

        // Storage Service
        const StorageService = {
            async init() {
                try {
                    const users = await this.get('users');
                    if (!users) {
                        await this.set('users', JSON.stringify([
                            {
                                id: '1',
                                name: 'Administrador',
                                email: 'admin@meudinheiro.com',
                                password: 'admin123',
                                role: 'admin',
                                createdAt: new Date().toISOString()
                            }
                        ]));
                    }

                    // Criar bancos padrão se não existirem
                    const banks = await this.get('banks_1');
                    if (!banks) {
                        await this.set('banks_1', JSON.stringify([
                            { id: '1', name: 'Nubank', type: 'Conta Corrente', balance: 0, color: '#8b5cf6' },
                            { id: '2', name: 'Cartão Nubank', type: 'Cartão de Crédito', balance: 0, color: '#ef4444' }
                        ]));
                    }
                } catch (error) {
                    console.error('Erro ao inicializar storage:', error);
                }
            },

            async get(key) {
                try {
                    const result = await window.storage.get(key);
                    return result ? result.value : null;
                } catch (error) {
                    return null;
                }
            },

            async set(key, value) {
                try {
                    return await window.storage.set(key, value);
                } catch (error) {
                    console.error('Erro ao salvar:', error);
                    return null;
                }
            },

            async delete(key) {
                try {
                    return await window.storage.delete(key);
                } catch (error) {
                    console.error('Erro ao deletar:', error);
                    return null;
                }
            }
        };

        // Auth Hook
        function useAuth() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadCurrentUser();
            }, []);

            async function loadCurrentUser() {
                try {
                    const userJson = await StorageService.get('currentUser');
                    if (userJson) {
                        setCurrentUser(JSON.parse(userJson));
                    }
                } catch (error) {
                    console.error('Erro ao carregar usuário:', error);
                } finally {
                    setLoading(false);
                }
            }

            async function login(email, password) {
                const usersJson = await StorageService.get('users');
                const users = usersJson ? JSON.parse(usersJson) : [];
                
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    const { password, ...userWithoutPassword } = user;
                    await StorageService.set('currentUser', JSON.stringify(userWithoutPassword));
                    setCurrentUser(userWithoutPassword);
                    return { success: true };
                }
                
                return { success: false, error: 'Email ou senha inválidos' };
            }

            async function register(name, email, password) {
                const usersJson = await StorageService.get('users');
                const users = usersJson ? JSON.parse(usersJson) : [];
                
                if (users.find(u => u.email === email)) {
                    return { success: false, error: 'Email já cadastrado' };
                }

                const newUser = {
                    id: Date.now().toString(),
                    name,
                    email,
                    password,
                    role: 'user',
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                await StorageService.set('users', JSON.stringify(users));
                
                const { password: _, ...userWithoutPassword } = newUser;
                await StorageService.set('currentUser', JSON.stringify(userWithoutPassword));
                setCurrentUser(userWithoutPassword);
                
                // Criar bancos padrão para novo usuário
                await StorageService.set(`banks_${newUser.id}`, JSON.stringify([
                    { id: '1', name: 'Conta Principal', type: 'Conta Corrente', balance: 0, color: '#0ea5e9' }
                ]));
                
                return { success: true };
            }

            async function logout() {
                await StorageService.delete('currentUser');
                setCurrentUser(null);
            }

            return { currentUser, login, register, logout, loading };
        }

        // Transactions Hook
        function useTransactions(userId) {
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadTransactions();
            }, [userId]);

            async function loadTransactions() {
                try {
                    const key = `transactions_${userId}`;
                    const data = await StorageService.get(key);
                    setTransactions(data ? JSON.parse(data) : []);
                } catch (error) {
                    console.error('Erro ao carregar transações:', error);
                } finally {
                    setLoading(false);
                }
            }

            async function addTransaction(transaction) {
                const newTransaction = {
                    id: Date.now().toString(),
                    ...transaction,
                    userId,
                    createdAt: new Date().toISOString()
                };

                const updated = [...transactions, newTransaction];
                setTransactions(updated);
                await StorageService.set(`transactions_${userId}`, JSON.stringify(updated));
                return newTransaction;
            }

            async function updateTransaction(id, updates) {
                const updated = transactions.map(t => 
                    t.id === id ? { ...t, ...updates } : t
                );
                setTransactions(updated);
                await StorageService.set(`transactions_${userId}`, JSON.stringify(updated));
            }

            async function deleteTransaction(id) {
                const updated = transactions.filter(t => t.id !== id);
                setTransactions(updated);
                await StorageService.set(`transactions_${userId}`, JSON.stringify(updated));
            }

            return { transactions, addTransaction, updateTransaction, deleteTransaction, loading };
        }

        function useBanks(userId) {

            useEffect(() => {

            async function addBank(bank) {
                const newBank = {
                    id: Date.now().toString(),
                    ...bank
                };
                const updated = [...banks, newBank];
                setBanks(updated);
                await StorageService.set(`banks_${userId}`, JSON.stringify(updated));
            }

            async function updateBank(id, updates) {
                const updated = banks.map(b => 
                    b.id === id ? { ...b, ...updates } : b
                );
                setBanks(updated);

        // Cashflow Tab Component
        function CashflowTab({ transactions }) {
            const chartData = useMemo(() => {
                const monthlyData = {};
                const today = new Date();
                
                // Gerar próximos 12 meses
                for (let i = 0; i < 12; i++) {
                    const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
                    const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    monthlyData[key] = {
                        month: date.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' }),
                        income: 0,
                        expense: 0,
                        balance: 0
                    };
                }

                transactions.forEach(t => {
                    const date = new Date(t.date);
                    const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    
                    if (monthlyData[key]) {
                        const amount = parseFloat(t.amount);
                        if (t.type === 'income') {
                            monthlyData[key].income += amount;
                        } else {
                            monthlyData[key].expense += amount;
                        }
                    }
                });

                // Calcular saldo acumulado
                let accumulated = 0;
                return Object.keys(monthlyData).sort().map(key => {
                    const data = monthlyData[key];
                    const monthBalance = data.income - data.expense;
                    accumulated += monthBalance;
                    return {
                        ...data,
                        balance: monthBalance,
                        accumulated
                    };
                });
            }, [transactions]);

            return (
                <div>
                    <div className="cashflow-chart">
                        <h2 className="card-title" style={{marginBottom: '2rem'}}>
                            📈 Projeção de Fluxo de Caixa - Próximos 12 Meses
                        </h2>
                        <ResponsiveContainer width="100%" height={400}>
                            <LineChart data={chartData}>
                                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
                                <XAxis 
                                    dataKey="month" 
                                    stroke="var(--text-secondary)"
                                    style={{ fontSize: '0.875rem' }}
                                />
                                <YAxis 
                                    stroke="var(--text-secondary)"
                                    style={{ fontSize: '0.875rem' }}
                                    tickFormatter={(value) => `R$ ${value.toLocaleString('pt-BR')}`}
                                />
                                <Tooltip 
                                    contentStyle={{
                                        background: 'var(--bg-primary)',
                                        border: '1px solid var(--border)',
                                        borderRadius: '12px',
                                        padding: '1rem'
                                    }}
                                    formatter={(value) => `R$ ${value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`}
                                />
                                <Legend />
                                <Line 
                                    type="monotone" 
                                    dataKey="income" 
                                    stroke="var(--success)" 
                                    strokeWidth={3}
                                    name="Receitas"
                                    dot={{ fill: 'var(--success)', r: 5 }}
                                />
                                <Line 
                                    type="monotone" 
                                    dataKey="expense" 
                                    stroke="var(--danger)" 
                                    strokeWidth={3}
                                    name="Despesas"
                                    dot={{ fill: 'var(--danger)', r: 5 }}
                                />
                                <Line 
                                    type="monotone" 
                                    dataKey="accumulated" 
                                    stroke="var(--primary)" 
                                    strokeWidth={3}
                                    name="Saldo Acumulado"
                                    dot={{ fill: 'var(--primary)', r: 5 }}
                                    strokeDasharray="5 5"
                                />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>

                    <div className="cashflow-chart">
                        <h2 className="card-title" style={{marginBottom: '2rem'}}>
                            📊 Receitas vs Despesas por Mês
                        </h2>
                        <ResponsiveContainer width="100%" height={400}>
                            <BarChart data={chartData}>
                                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
                                <XAxis 
                                    dataKey="month" 
                                    stroke="var(--text-secondary)"
                                    style={{ fontSize: '0.875rem' }}
                                />
                                <YAxis 
                                    stroke="var(--text-secondary)"
                                    style={{ fontSize: '0.875rem' }}
                                    tickFormatter={(value) => `R$ ${value.toLocaleString('pt-BR')}`}
                                />
                                <Tooltip 
                                    contentStyle={{
                                        background: 'var(--bg-primary)',
                                        border: '1px solid var(--border)',
                                        borderRadius: '12px',
                                        padding: '1rem'
                                    }}
                                    formatter={(value) => `R$ ${value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`}
                                />
                                <Legend />
                                <Bar dataKey="income" fill="var(--success)" name="Receitas" radius={[8, 8, 0, 0]} />
                                <Bar dataKey="expense" fill="var(--danger)" name="Despesas" radius={[8, 8, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        // Admin Tab Component
        function AdminTab({ userId }) {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadUsers();
            }, []);

            async function loadUsers() {
                try {
                    const usersJson = await StorageService.get('users');
                    setUsers(usersJson ? JSON.parse(usersJson) : []);
                } catch (error) {
                    console.error('Erro ao carregar usuários:', error);
                } finally {
                    setLoading(false);
                }
            }

            async function deleteUser(id) {
                if (id === userId) {
                    alert('Você não pode deletar sua própria conta!');
                    return;
                }

                if (confirm('Tem certeza que deseja excluir este usuário? Todos os dados serão perdidos!')) {
                    const updated = users.filter(u => u.id !== id);
                    setUsers(updated);
                    await StorageService.set('users', JSON.stringify(updated));
                    await StorageService.delete(`transactions_${id}`);
                    await StorageService.delete(`banks_${id}`);
                }
            }

            if (loading) {
                return (
                    <div className="loading">
                        <div className="spinner"></div>
                        <p>Carregando usuários...</p>
                    </div>
                );
            }

            return (
                <div className="card">
                    <div className="card-header">
                        <h2 className="card-title">👥 Gerenciar Usuários</h2>
                        <div style={{
                            background: 'var(--info-light)',

                                }}>

                                        <div style={{
                                            fontWeight: 800,
                                            fontSize: '1.125rem',
                                            marginBottom: '0.25rem'
                                        }}>
                                            {user.name}
                                        </div>
                                        <div style={{
                                            color: 'var(--text-secondary)',
                                            fontSize: '0.875rem'

                                <div style={{
                                    fontSize: '0.875rem',
                                    color: 'var(--text-secondary)',
                                    marginBottom: '1rem'
                                }}>
                                    📅 Cadastrado em: {new Date(user.createdAt).toLocaleDateString('pt-BR')}
                                </div>
                                {user.id !== userId && (
                                    <button 
                                        className="btn btn-danger btn-sm" 
                                        style={{width: '100%'}}
                                        onClick={() => deleteUser(user.id)}
                                    >
                                        🗑️ Excluir Usuário
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [showLogin, setShowLogin] = useState(true);
            const { currentUser, login, register, logout, loading } = useAuth();

            useEffect(() => {
                StorageService.init();
            }, []);

            if (loading) {
                return (
                    <div className="loading" style={{height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                        <div>
                            <div className="spinner"></div>
                            <p>Carregando aplicativo...</p>
                        </div>
                    </div>
                );
            }

            if (!currentUser) {
                return showLogin ? (
                    <LoginForm 
                        onLogin={login} 
                        onToggle={() => setShowLogin(false)} 
                    />
                ) : (
                    <RegisterForm 
                        onRegister={register} 
                        onToggle={() => setShowLogin(true)} 
                    />
                );
            }

            return <Dashboard user={currentUser} onLogout={logout} />;
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
